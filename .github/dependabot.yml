version: 2
updates:
  # Free, GitHub-native — opens PRs automatically when a dependency has a
  # newer version or a security advisory. Those PRs run through the same
  # `ci.yml` checks as any human-authored PR before you'd ever merge one.
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    groups:
      server-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
    groups:
      client-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
